<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#020c18">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Gluconova</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #020c18;
  --ink2: #061426;
  --ink3: #0c2240;
  --glass: rgba(12,34,64,0.7);
  --lime: #a8ff3e;
  --lime2: #7fd420;
  --cyan: #3efff8;
  --border: rgba(168,255,62,0.12);
  --text: #d4ecc8;
  --muted: #4a7060;
  --danger: #ff5c5c;
}
html, body { height: 100%; }
body {
  font-family: 'Syne', sans-serif;
  background: var(--ink);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* ── Background ── */
.bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 10% 110%, rgba(168,255,62,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% -10%, rgba(62,255,248,0.05) 0%, transparent 55%),
    var(--ink);
}
.bg-grid {
  position: fixed; inset: 0; z-index: 0; opacity: 0.4;
  background-image:
    linear-gradient(rgba(168,255,62,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(168,255,62,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
}
.orb {
  position: fixed; border-radius: 50%; z-index: 0; filter: blur(100px); pointer-events: none;
  animation: drift 8s ease-in-out infinite alternate;
}
.orb1 { width: 500px; height: 500px; background: rgba(168,255,62,0.05); top: -200px; left: -100px; }
.orb2 { width: 400px; height: 400px; background: rgba(62,255,248,0.04); bottom: -150px; right: -100px; animation-delay: -4s; }
@keyframes drift { to { transform: translate(30px, 20px) scale(1.05); } }

/* ── Layout ── */
.wrap { position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 20px; }

/* ── Logo ── */
.logo { text-align: center; margin-bottom: 44px; }
.logo-mark {
  display: inline-flex; align-items: center; justify-content: center;
  width: 72px; height: 72px; border-radius: 22px; margin-bottom: 18px;
  background: linear-gradient(135deg, var(--lime), var(--cyan));
  box-shadow: 0 0 0 1px rgba(168,255,62,0.3), 0 0 50px rgba(168,255,62,0.2), 0 20px 40px rgba(0,0,0,0.4);
  animation: logo-pulse 3s ease-in-out infinite;
}
@keyframes logo-pulse {
  0%,100% { box-shadow: 0 0 0 1px rgba(168,255,62,0.3), 0 0 50px rgba(168,255,62,0.2), 0 20px 40px rgba(0,0,0,0.4); }
  50% { box-shadow: 0 0 0 1px rgba(168,255,62,0.5), 0 0 80px rgba(168,255,62,0.35), 0 20px 40px rgba(0,0,0,0.4); }
}
.logo h1 {
  font-size: 34px; font-weight: 800; letter-spacing: -1px;
  background: linear-gradient(135deg, #fff 30%, var(--lime));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.logo p {
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted);
  letter-spacing: 2px; text-transform: uppercase; margin-top: 6px;
}

/* ── Card ── */
.card {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 36px 32px;
  backdrop-filter: blur(20px);
  box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(168,255,62,0.08);
}

/* ── Tabs ── */
.tabs { display: flex; background: var(--ink3); border-radius: 12px; padding: 4px; margin-bottom: 30px; }
.tab {
  flex: 1; padding: 11px; border: none; background: transparent;
  font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
  color: var(--muted); border-radius: 9px; cursor: pointer; transition: all 0.25s;
  letter-spacing: 0.3px;
}
.tab.active { background: var(--lime); color: var(--ink); }

/* ── Form ── */
.panel { display: none; animation: fadein 0.3s ease; }
.panel.active { display: block; }
@keyframes fadein { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

.field { margin-bottom: 18px; }
.field label {
  display: block; font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 8px;
}
.field input {
  width: 100%; padding: 13px 16px;
  background: rgba(6,20,38,0.8);
  border: 1px solid var(--border);
  border-radius: 11px; color: var(--text);
  font-family: 'Syne', sans-serif; font-size: 15px;
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.field input:focus {
  border-color: rgba(168,255,62,0.5);
  box-shadow: 0 0 0 3px rgba(168,255,62,0.08);
}
.field input::placeholder { color: rgba(74,112,96,0.6); }

.btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--lime), var(--lime2));
  border: none; border-radius: 11px;
  color: var(--ink); font-family: 'Syne', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: all 0.2s; margin-top: 6px; letter-spacing: 0.3px;
  box-shadow: 0 8px 24px rgba(168,255,62,0.2);
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(168,255,62,0.3); }
.btn:active { transform: none; }
.btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 22px 0; color: var(--muted); font-size: 12px;
}
.divider::before, .divider::after { content:''; flex:1; height:1px; background: var(--border); }

.btn-google {
  width: 100%; padding: 13px; background: rgba(255,255,255,0.05);
  border: 1px solid var(--border); border-radius: 11px;
  color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px;
  font-weight: 600; cursor: pointer; display: flex; align-items: center;
  justify-content: center; gap: 10px; transition: all 0.2s;
}
.btn-google:hover { background: rgba(255,255,255,0.09); border-color: rgba(168,255,62,0.25); }

.msg { margin-top: 14px; text-align: center; font-size: 13px; min-height: 20px; }
.msg.err { color: var(--danger); }
.msg.ok { color: var(--lime); }

.live-badge {
  display: inline-flex; align-items: center; gap: 7px;
  background: rgba(168,255,62,0.08); border: 1px solid rgba(168,255,62,0.18);
  border-radius: 20px; padding: 5px 14px;
  font-family: 'DM Mono', monospace; font-size: 10px; color: var(--lime);
  letter-spacing: 1px; text-transform: uppercase; margin-bottom: 26px;
}
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--lime); animation: blink 1.4s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

/* Mobile tweaks */
@media (max-width: 480px) {
  .card { padding: 28px 22px; border-radius: 20px; }
  .logo h1 { font-size: 28px; }
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="wrap">
  <div class="logo">
    <div class="logo-mark">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <path d="M18 3C18 3 8 10 8 20C8 25.5 12.5 30 18 30C23.5 30 28 25.5 28 20C28 10 18 3 18 3Z" fill="rgba(2,12,24,0.85)"/>
        <path d="M18 9C18 9 11 15 11 20C11 23.9 14.1 27 18 27C21.9 27 25 23.9 25 20C25 15 18 9 18 9Z" fill="rgba(62,255,248,0.18)"/>
        <path d="M13.5 20.5 L16.5 23.5 L23 16" stroke="rgba(2,12,24,0.9)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>Gluconova</h1>
    <p>NIR Glucose Intelligence</p>
  </div>

  <div class="card">
    <div style="text-align:center">
      <div class="live-badge"><div class="dot"></div>Firebase · Real-time Sync</div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login -->
    <div class="panel active" id="panel-login">
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="l-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn" id="l-btn" onclick="doLogin()">Access Dashboard →</button>
      <div class="divider">or</div>
      <button class="btn-google" onclick="doGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 33.2 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.6-8 19.6-20 0-1.3-.1-2.7-.4-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5L31.8 34c-2.1 1.4-4.8 2.2-7.8 2.2-5.2 0-9.6-3.3-11.3-7.8l-6.5 5C9.8 39.6 16.4 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.3-2.3 4.2-4.3 5.5l5.7 5c3.6-3.3 5.9-8.2 5.9-14-.1-1.3-.2-2.7-.4-4.5z"/></svg>
        Continue with Google
      </button>
      <div class="msg" id="l-msg"></div>
    </div>

    <!-- Register -->
    <div class="panel" id="panel-register">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="r-name" placeholder="Your Name" autocomplete="name">
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="r-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="r-pass" placeholder="Min. 6 characters" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <button class="btn" id="r-btn" onclick="doRegister()">Create Account →</button>
      <div class="divider">or</div>
      <button class="btn-google" onclick="doGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 33.2 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.6-8 19.6-20 0-1.3-.1-2.7-.4-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5L31.8 34c-2.1 1.4-4.8 2.2-7.8 2.2-5.2 0-9.6-3.3-11.3-7.8l-6.5 5C9.8 39.6 16.4 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.3-2.3 4.2-4.3 5.5l5.7 5c3.6-3.3 5.9-8.2 5.9-14-.1-1.3-.2-2.7-.4-4.5z"/></svg>
        Sign up with Google
      </button>
      <div class="msg" id="r-msg"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
  updateProfile, GoogleAuthProvider, signInWithPopup, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyCG3PqejO30BhqJXxbra14WHEukkOMKJLM",
  authDomain: "gluconova-e0c81.firebaseapp.com",
  databaseURL: "https://gluconova-e0c81-default-rtdb.firebaseio.com",
  projectId: "gluconova-e0c81",
  storageBucket: "gluconova-e0c81.firebasestorage.app",
  messagingSenderId: "1048165398100",
  appId: "1:1048165398100:web:3913b713bfa5f72b795fc1"
});
const auth = getAuth(app);
const db = getDatabase(app);
const googleProvider = new GoogleAuthProvider();

// Redirect if already logged in
onAuthStateChanged(auth, user => {
  if (user) location.href = 'dashboard.html';
});

function setMsg(id, text, isErr) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + (isErr ? 'err' : 'ok');
}

async function saveUserProfile(uid, name, email) {
  await set(ref(db, `users/${uid}/profile`), {
    name, email,
    createdAt: Date.now(),
    diabetesType: 'unknown',
    targetMin: 70,
    targetMax: 140
  });
}

window.switchTab = (tab) => {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${tab}`).classList.add('active');
};

window.doLogin = async () => {
  const email = document.getElementById('l-email').value.trim();
  const pass = document.getElementById('l-pass').value;
  const btn = document.getElementById('l-btn');
  if (!email || !pass) { setMsg('l-msg','Fill in all fields.',true); return; }
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    setMsg('l-msg','✓ Welcome back! Loading...', false);
    setTimeout(() => location.href = 'dashboard.html', 600);
  } catch(e) {
    const msgs = {
      'auth/user-not-found': 'No account found with this email.',
      'auth/wrong-password': 'Incorrect password.',
      'auth/too-many-requests': 'Too many attempts. Try again later.',
      'auth/invalid-credential': 'Invalid email or password.'
    };
    setMsg('l-msg', msgs[e.code] || e.message, true);
    btn.disabled = false; btn.textContent = 'Access Dashboard →';
  }
};

window.doRegister = async () => {
  const name = document.getElementById('r-name').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const pass = document.getElementById('r-pass').value;
  const btn = document.getElementById('r-btn');
  if (!name || !email || !pass) { setMsg('r-msg','Fill in all fields.',true); return; }
  if (pass.length < 6) { setMsg('r-msg','Password must be at least 6 characters.',true); return; }
  btn.disabled = true; btn.textContent = 'Creating account...';
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    await saveUserProfile(cred.user.uid, name, email);
    setMsg('r-msg','✓ Account created! Redirecting...', false);
    setTimeout(() => location.href = 'dashboard.html', 700);
  } catch(e) {
    const msgs = {
      'auth/email-already-in-use': 'Email already registered. Sign in instead.',
      'auth/invalid-email': 'Invalid email address.',
      'auth/weak-password': 'Password is too weak.'
    };
    setMsg('r-msg', msgs[e.code] || e.message, true);
    btn.disabled = false; btn.textContent = 'Create Account →';
  }
};

window.doGoogle = async () => {
  try {
    const result = await signInWithPopup(auth, googleProvider);
    const u = result.user;
    await saveUserProfile(u.uid, u.displayName || 'User', u.email);
    location.href = 'dashboard.html';
  } catch(e) {
    setMsg('l-msg', 'Google sign-in failed. Try again.', true);
  }
};
</script>
</body>
</html>
